{% extends "base.html" %}
{% block title %} — Cadastrar Item{% endblock %}

{% block content %}
<div style="max-width:600px;">
  <p style="margin-bottom:1.5rem;">
    <a href="/" style="color:var(--muted);text-decoration:none;font-size:.875rem;">← Voltar ao feed</a>
  </p>

  <div class="form-card">
    <h2>Cadastrar novo item</h2>

    <form method="POST" action="/cadastrar">
      <div class="form-group">
        <label for="nome">Nome do item</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Notebook Dell, Sofá 2 lugares…" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="categoria">Categoria de descarte</label>
          <select id="categoria" name="categoria" required>
            <option value="" disabled selected>Selecione…</option>
            {% for cat in categorias %}
              <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="estado">Estado de conservação</label>
          <select id="estado" name="estado" required>
            <option value="" disabled selected>Selecione…</option>
            {% for est in estados %}
              <option value="{{ est }}">{{ est }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="contato">Contato do doador</label>
        <input type="text" id="contato" name="contato" placeholder="E-mail ou telefone" required />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição (opcional)</label>
        <textarea id="descricao" name="descricao" placeholder="Detalhes sobre o item, condições de retirada…"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">♻️ Publicar item</button>
        <a href="/" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
